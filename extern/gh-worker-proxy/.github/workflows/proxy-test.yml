name: Proxy Test

on:
  workflow_dispatch:
    inputs:
      fingerprint:
        description: "Server TLS certificate SHA256 fingerprint"
        required: true
      token:
        description: "Server auth token"
        required: true
      relay_addr:
        description: "Relay address (wss://... or host:port)"
        required: true
      relay_token:
        description: "Relay session token"
        required: true

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml') }}

      - name: Build
        run: cargo build --release

      - name: Get direct IP
        run: |
          DIRECT_IP=$(curl -s ifconfig.me)
          echo "DIRECT_IP=$DIRECT_IP" >> $GITHUB_ENV
          echo "Direct IP: $DIRECT_IP"

      - name: Start agent
        run: |
          RUST_LOG=gwp=info ./target/release/gwp agent \
            --relay "${{ inputs.relay_addr }}" \
            --relay-token "${{ inputs.relay_token }}" \
            --fingerprint "${{ inputs.fingerprint }}" \
            --token "${{ inputs.token }}" \
            --listen 127.0.0.1:1080 &
          sleep 5

      - name: Verify proxy
        run: |
          PROXIED_IP=$(curl -s --max-time 15 --socks5-hostname 127.0.0.1:1080 http://ifconfig.me)
          echo "Direct IP:  $DIRECT_IP"
          echo "Proxied IP: $PROXIED_IP"
          if [ -z "$PROXIED_IP" ]; then
            echo "FAIL: no response through proxy"
            exit 1
          fi
          if [ "$DIRECT_IP" = "$PROXIED_IP" ]; then
            echo "FAIL: proxied IP matches direct IP — tunnel not working"
            exit 1
          fi
          echo "SUCCESS: traffic is routed through the tunnel"
